<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1d4ed8 55%, #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #0f172a;
        }
        .login-shell {
           
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            overflow: hidden;
            backdrop-filter: blur(14px);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.35);
        }
        .brand-panel {
            padding: 56px;
            color: white;
            background: linear-gradient(160deg, rgba(15,23,42,0.92), rgba(30,64,175,0.75));
        }
        .brand-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            font-size: 13px;
            letter-spacing: 0.4px;
            margin-bottom: 24px;
        }
        .brand-panel h1 {
            margin: 0 0 16px;
            font-size: 40px;
            line-height: 1.15;
        }
        .brand-panel p {
            margin: 0 0 26px;
            line-height: 1.7;
            color: #dbeafe;
        }
        .feature-list {
            display: grid;
            gap: 14px;
        }
        .feature-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 16px 18px;
        }
        .feature-item strong {
            display: block;
            margin-bottom: 6px;
        }
        .form-panel {
            padding: 48px 42px;
            background: #ffffff;
        }
        .form-panel h2 {
            margin: 0 0 8px;
            font-size: 30px;
            color: #0f172a;
        }
        .muted {
            margin: 0 0 24px;
            color: #64748b;
        }
        .alert {
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .alert-error { background: #fee2e2; color: #b91c1c; }
        .demo-box {
            margin-bottom: 18px;
            padding: 14px;
            border-radius: 14px;
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 14px;
            border: 1px solid #bfdbfe;
        }
        label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
            color: #334155;
        }
        .input-group { margin-bottom: 18px; }
        input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        button {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 15px;
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.24);
        }
        button:hover { transform: translateY(-1px); }
        .help-text {
            margin-top: 14px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.6;
        }
        @media (max-width: 900px) {
            .login-shell { grid-template-columns: 1fr; }
            .brand-panel, .form-panel { padding: 32px 24px; }
            .brand-panel h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
<div class="login-shell">
    <!-- <div class="brand-panel">
        <span class="brand-badge">Finance Role Based Portal</span>
        <p>This is a demo application to showcase role based access control using manual session management in a Spring Boot app with Thymeleaf templates.</p>
        
         <div class="feature-list">
            <div class="feature-item">
                <strong>Viewer</strong>
                Can only view dashboard summary.
            </div>
            <div class="feature-item">
                <strong>Analyst</strong>
                Can view records and access insights.
            </div>
            <div class="feature-item">
                <strong>Admin</strong>
                Can create, update, manage users, and assign roles.
            </div>
        </div> 
    </div> -->

    <div class="form-panel">
        <h2>Sign In</h2>
        <p class="muted">Enter your username and password to continue.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="demo-box">
            <strong>Default admin:</strong> username <b>admin</b> and password <b>admin123</b>
        </div>

        <form th:action="@{/signin}" th:object="${user}" method="post">
            <div class="input-group">
                <label for="name">Username</label>
                <input id="name" type="text" th:field="*{name}" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" placeholder="Enter password" required>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <p class="help-text">
            New users are created only by Admin from dashboard. Role selection is not shown here.
        </p>
    </div>
</div>
</body>
</html>
