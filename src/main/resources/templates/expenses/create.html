<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Record</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f8fafc 55%, #e0f2fe); display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { width: 100%; max-width: 680px; background: white; border-radius: 24px; padding: 32px; border: 1px solid #e2e8f0; box-shadow: 0 25px 55px rgba(15,23,42,0.10); }
        h1 { margin-top: 0; margin-bottom: 8px; }
        .muted { color: #64748b; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #334155; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 13px 14px; border: 1px solid #cbd5e1; border-radius: 14px; font-size: 15px; }
        textarea { min-height: 120px; resize: vertical; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { border: none; border-radius: 14px; padding: 14px 18px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 14px; }
        .primary { background: #2563eb; color: white; }
        .secondary { background: #e2e8f0; color: #0f172a; }
        .field-error { color: #b91c1c; font-size: 13px; margin-top: 6px; }
        @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="card">
    <h1>Create Financial Record</h1>
    <p class="muted">Analyst and Admin can add records.</p>

    <form th:action="@{/expenses}" th:object="${expense}" method="post">
        <div class="grid">
            <div>
                <label for="amount">Amount</label>
                <input id="amount" type="number" step="0.01" th:field="*{amount}">
                <div class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>
            <div>
                <label for="type">Type</label>
                <select id="type" th:field="*{type}">
                    <option value="">Select type</option>
                    <option value="INCOME">Income</option>
                    <option value="EXPENSE">Expense</option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
            </div>
            <div>
                <label for="category">Category</label>
                <input id="category" type="text" th:field="*{category}">
                <div class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>
            <div>
                <label for="date">Date</label>
                <input id="date" type="date" th:field="*{date}">
                <div class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
            </div>
            <div class="full">
                <label for="notes">Notes</label>
                <textarea id="notes" th:field="*{notes}" placeholder="Write short notes"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
            </div>
        </div>
        <div class="actions">
            <button type="submit" class="btn primary">Save Record</button>
            <a href="/expenses" class="btn secondary">Back to Records</a>
        </div>
    </form>
</div>
</body>
</html>
